<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" href="https://em-content.zobj.net/source/apple/391/flag-united-kingdom_1f1ec-1f1e7.png">

<title>British Idioms</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  min-height:100vh;
  background:#1a2e1a;
  background-image:
    radial-gradient(
      ellipse at top,
      #2d4a2d 0%,
      #1a2e1a 70%
    );
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  font-family:'Lato',sans-serif;
  color:#f5e6c8;
  padding:14px 16px;
  overflow-x:hidden;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  letter-spacing:2px;
  color:#d4a843;
  margin-bottom:2px;
  text-align:center;
}

.subtitle{
  font-size:0.68rem;
  color:#8a9e8a;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.scene{
  width:min(340px,92vw);
  height:min(460px,62vh);
  perspective:1000px;
  cursor:pointer;
  margin-bottom:12px;
}

.flipcard{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.flipcard.flipped{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:18px;
  border:1px solid #3d5c3d;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  padding:24px;
  display:flex;
  flex-direction:column;
}

.front{
  background:
    linear-gradient(
      145deg,
      #243824,
      #1e321e
    );
}

.back{
  background:
    linear-gradient(
      145deg,
      #2a3d1e,
      #1e2d14
    );
  transform:rotateY(180deg);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:12px;
}

.vibe-badge{
  font-size:0.62rem;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid;
}

.vibe-formal{
  color:#a0b8d8;
  border-color:#a0b8d8;
}

.vibe-casual{
  color:#a8d8a0;
  border-color:#a8d8a0;
}

.vibe-cheeky{
  color:#d8c0a0;
  border-color:#d8c0a0;
}

.vibe-sharp{
  color:#d8a0a0;
  border-color:#d8a0a0;
}

.idiom-main{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  color:#d4a843;
  line-height:1.4;
  margin-bottom:12px;
}

.meaning-text{
  font-size:0.9rem;
  color:#c8d8c8;
  line-height:1.7;
  margin-bottom:12px;
}

.example-box{
  background:rgba(255,255,255,0.04);
  border-left:2px solid #3d5c3d;
  border-radius:0 8px 8px 0;
  padding:10px 12px;
  margin-bottom:12px;
}

.example-label{
  font-size:0.58rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#6a8a6a;
  margin-bottom:4px;
}

.example-text{
  font-size:0.8rem;
  color:#b8c8b8;
  line-height:1.6;
  font-style:italic;
}

.uk-note{
  font-size:0.76rem;
  color:#8a9e8a;
  line-height:1.6;
  padding-top:10px;
  border-top:1px solid #2d4a2d;
  margin-top:auto;
}

.story-text{
  font-size:0.84rem;
  color:#c8d8c8;
  line-height:1.8;
  overflow-y:auto;
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.btn{
  padding:10px 15px;
  border:1px solid #3d5c3d;
  border-radius:8px;
  background:#243824;
  color:#d4a843;
  font-size:1rem;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.95);
}

.counter{
  font-size:0.72rem;
  color:#4a6a4a;
  letter-spacing:2px;
  margin-bottom:10px;
}

.footer{
  margin-top:12px;
  text-align:center;
}

.footer p{
  font-size:0.65rem;
  color:#3d5c3d;
}

</style>
</head>

<body>

<h1>🇬🇧 British Idioms</h1>

<p class="subtitle">
語源と裏話で学ぶ
</p>

<div class="scene" onclick="flipCard()">

  <div class="flipcard" id="flipcard">

    <div class="face front" id="front"></div>

    <div class="face back" id="back"></div>

  </div>

</div>

<div class="controls">

  <button class="btn" onclick="prevCard(event)">
    ←
  </button>

  <button class="btn" onclick="playSound(event)">
    🔊
  </button>

  <button class="btn" onclick="toggleFav(event)">
    ❤️
  </button>

  <button class="btn" onclick="markLearned(event)">
    📚
  </button>

  <button class="btn" onclick="nextCard(event)">
    →
  </button>

</div>

<div class="counter" id="counter"></div>

<div class="footer">
  <p>
    © 2026 Saki Miura
  </p>
</div>

<script>

const IDIOMS = [

{
  idiom:"Bob's your uncle",
  vibe:"casual",
  meaning:"簡単にうまくいくこと。",
  example:"Mix it up and Bob's your uncle!",
  uk:"英国人らしい定番表現。",
  story:"19世紀英国政治の縁故採用が語源。"
},

{
  idiom:"Gobsmacked",
  vibe:"casual",
  meaning:"驚きすぎて言葉を失う。",
  example:"I was gobsmacked!",
  uk:"超英国っぽいスラング。",
  story:"gob（口）+ smacked（叩かれた）から。"
},

{
  idiom:"Cheeky",
  vibe:"cheeky",
  meaning:"愛嬌ある生意気さ。",
  example:"A cheeky biscuit.",
  uk:"英国ではポジティブにも使う。",
  story:"英国らしいユーモア表現。"
},

{
  idiom:"Knackered",
  vibe:"casual",
  meaning:"くたくた。",
  example:"I'm absolutely knackered.",
  uk:"英国人超よく使う。",
  story:"老馬処理業者 knacker が由来。"
}

];

const VIBE_LABELS = {
  formal:"🎩 Formal",
  casual:"😊 Casual",
  cheeky:"😏 Cheeky",
  sharp:"😤 Sharp"
};

let idx = 0;

let isFlipped = false;

let isSpeaking = false;

let favorites =
  JSON.parse(
    localStorage.getItem('bf_favs')
    || '[]'
  );

function cur() {
  return IDIOMS[idx];
}

function vibeMeter(vibe){

  switch(vibe){

    case 'formal':
      return '███░░░░░░';

    case 'casual':
      return '███████░░░';

    case 'cheeky':
      return '████████░░';

    case 'sharp':
      return '██████████';

    default:
      return '████░░░░░░';
  }
}

function showCard(){

  const c = cur();

  document
    .getElementById('front')
    .innerHTML = `

    <div class="card-top">

      <span class="
        vibe-badge
        vibe-${c.vibe}
      ">
        ${VIBE_LABELS[c.vibe]}
      </span>

      <span>🇬🇧</span>

    </div>

    <div class="idiom-main">
      "${c.idiom}"
    </div>

    <div class="meaning-text">
      ${c.meaning}
    </div>

    <div class="example-box">

      <div class="example-label">
        Example
      </div>

      <div class="example-text">
        ${c.example}
      </div>

    </div>

    <div class="uk-note">

      ${c.uk}

      <br><br>

      🇬🇧 Casualness Meter

      <br>

      <span style="
        color:#d4a843;
        font-family:monospace;
        letter-spacing:2px;
      ">
        ${vibeMeter(c.vibe)}
      </span>

    </div>

  `;

  document
    .getElementById('back')
    .innerHTML = `

    <div class="idiom-main">
      "${c.idiom}"
    </div>

    <div class="story-text">
      ${c.story}
    </div>

  `;

  document
    .getElementById('counter')
    .textContent =
      `${idx + 1} / ${IDIOMS.length}`;
}

function flipCard(){

  isFlipped = !isFlipped;

  document
    .getElementById('flipcard')
    .classList.toggle(
      'flipped',
      isFlipped
    );
}

function nextCard(e){

  e.stopPropagation();

  idx =
    (idx + 1)
    % IDIOMS.length;

  showCard();
}

function prevCard(e){

  e.stopPropagation();

  idx =
    (idx - 1 + IDIOMS.length)
    % IDIOMS.length;

  showCard();
}

function playSound(e){

  e.stopPropagation();

  if(isSpeaking){

    speechSynthesis.cancel();

    isSpeaking = false;

    return;
  }

  const utt =
    new SpeechSynthesisUtterance(
      cur().idiom
    );

  utt.lang = 'en-GB';

  utt.rate = 0.78;

  utt.pitch = 0.92;

  const voice =
    speechSynthesis
      .getVoices()
      .find(v => v.lang === 'en-GB');

  if(voice){
    utt.voice = voice;
  }

  isSpeaking = true;

  utt.onend = () => {
    isSpeaking = false;
  };

  speechSynthesis.speak(utt);
}

function toggleFav(e){

  e.stopPropagation();

  const c = cur();

  const exists =
    favorites.some(
      f => f.idiom === c.idiom
    );

  if(!exists){

    favorites.push(c);

    localStorage.setItem(
      'bf_favs',
      JSON.stringify(favorites)
    );

    alert('❤️ Added to favourites');
  }
}

let learned =
  JSON.parse(
    localStorage.getItem('learned')
    || '[]'
  );

function markLearned(e){

  e.stopPropagation();

  const c = cur();

  if(
    !learned.includes(c.idiom)
  ){

    learned.push(c.idiom);

    localStorage.setItem(
      'learned',
      JSON.stringify(learned)
    );

    alert('📚 Learned!');
  }
}

/* 🇬🇧 SWIPE */

let touchStartX = 0;

let touchEndX = 0;

const scene =
  document.querySelector('.scene');

scene.addEventListener(
  'touchstart',
  e => {

    touchStartX =
      e.changedTouches[0].screenX;
  }
);

scene.addEventListener(
  'touchend',
  e => {

    touchEndX =
      e.changedTouches[0].screenX;

    handleSwipe();
  }
);

function handleSwipe(){

  const diff =
    touchStartX - touchEndX;

  if(diff > 50){

    idx =
      (idx + 1)
      % IDIOMS.length;

    showCard();
  }

  if(diff < -50){

    idx =
      (idx - 1 + IDIOMS.length)
      % IDIOMS.length;

    showCard();
  }
}

/* 🇬🇧 NIGHT MODE */

function applyNightMode(){

  const hour =
    new Date().getHours();

  if(hour >= 18 || hour <= 5){

    document.body.style.background =
      'linear-gradient(to bottom,#0f1720,#1a2e1a)';
  }
}

/* 🇬🇧 TODAY'S IDIOM */

function loadTodaysIdiom(){

  idx =
    new Date().getDate()
    % IDIOMS.length;

  showCard();
}

applyNightMode();

loadTodaysIdiom();

</script>

</body>
</html>
